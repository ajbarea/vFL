# Round-level attack × strategy matrix — stress-test surface.
#
# Runs FedAvg and FedMedian against every supported round-level attack type
# at default parameters. Produces a 2 * (1 baseline + 3 attacks) = 8-row
# comparison.md. For data-pipeline attacks (label flipping etc.) see
# `velocity.data_attacks` and the `mnist_label_flipping_vs_robust.py`
# nightly demo — those operate on labels in the data loader and are not
# expressible through the round-level `runs.attacks` schema.
#
#   velocity sweep experiments/attack_matrix.toml

[shared]
model_id    = "demo/model"
dataset     = "demo/dataset"
storage     = "local://checkpoints"
rounds      = 8
min_clients = 5
seed        = 42

[[runs]]
name     = "fedavg-clean"
strategy = "FedAvg"

[[runs]]
name     = "fedavg-model-poisoning"
strategy = "FedAvg"
[[runs.attacks]]
type      = "model_poisoning"
intensity = 0.5

[[runs]]
name     = "fedavg-sybil"
strategy = "FedAvg"
[[runs.attacks]]
type  = "sybil_nodes"
count = 3

[[runs]]
name     = "fedavg-gaussian"
strategy = "FedAvg"
[[runs.attacks]]
type      = "gaussian_noise"
intensity = 0.2

[[runs]]
name     = "fedmedian-clean"
strategy = "FedMedian"

[[runs]]
name     = "fedmedian-model-poisoning"
strategy = "FedMedian"
[[runs.attacks]]
type      = "model_poisoning"
intensity = 0.5

[[runs]]
name     = "fedmedian-sybil"
strategy = "FedMedian"
[[runs.attacks]]
type  = "sybil_nodes"
count = 3

[[runs]]
name     = "fedmedian-gaussian"
strategy = "FedMedian"
[[runs.attacks]]
type      = "gaussian_noise"
intensity = 0.2
