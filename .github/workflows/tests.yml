name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov prefect pydantic typer

      - name: Run Rust tests
        run: cargo test --all

      - name: Run Python tests with coverage
        run: PYTHONPATH=python pytest tests/ -v --cov=python/velocity --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false
