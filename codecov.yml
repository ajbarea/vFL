codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

comment: false

ignore:
  - "tests/**"
  - "docs/**"
  - "scripts/**"
  - "examples/**"
  - "experiments/**"
  - "*.md"
  # Type stubs for the PyO3 extension — declarations only, no runtime code.
  - "python/velocity/_core.pyi"
